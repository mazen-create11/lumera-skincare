<!DOCTYPE html><html><head><meta charset="utf-8"></head><body>
<div id="out">RUNNING</div>
<iframe id="f" style="width:1350px;height:5200px;border:0"></iframe>
<script>
var PAGE=(location.search.match(/[?&]p=([^&]+)/)||[])[1]||'bundle.html';
document.getElementById('f').src=PAGE;
function lin(c){c/=255;return c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4);}
function L(r,g,b){return 0.2126*lin(r)+0.7152*lin(g)+0.0722*lin(b);}
function parse(s){if(!s)return null;var m=s.match(/rgba?\(([^)]+)\)/);if(!m)return null;var p=m[1].split(',').map(function(x){return parseFloat(x);});return {r:p[0],g:p[1],b:p[2],a:p.length>3?p[3]:1};}
function comp(fg,bg){var a=fg.a;return {r:fg.r*a+bg.r*(1-a),g:fg.g*a+bg.g*(1-a),b:fg.b*a+bg.b*(1-a),a:1};}
function effBg(el,doc){var cur=el;var stack=[];while(cur){var cs=doc.defaultView.getComputedStyle(cur);if(cs.backgroundImage&&cs.backgroundImage!=='none')return {img:true};var bg=parse(cs.backgroundColor);if(bg&&bg.a>0){stack.push(bg);if(bg.a>=1)break;}cur=cur.parentElement;}
 var base={r:255,g:255,b:255,a:1};for(var i=stack.length-1;i>=0;i--){base=comp(stack[i],base);}return base;}
function cumOpacity(el,win){var o=1,cur=el;while(cur&&cur.nodeType===1){var op=parseFloat(win.getComputedStyle(cur).opacity);if(!isNaN(op))o*=op;cur=cur.parentElement;}return o;}
function ratio(f,b){var L1=L(f.r,f.g,f.b),L2=L(b.r,b.g,b.b);var hi=Math.max(L1,L2),lo=Math.min(L1,L2);return (hi+0.05)/(lo+0.05);}
function check(el,cs,fg,doc,win,tag){
 if(cs.visibility==='hidden'||cs.display==='none'||parseFloat(cs.opacity)===0)return null;
 if(el.closest('[aria-hidden="true"]'))return null;
 var bg=effBg(el,doc);if(bg.img)return null;
 if(fg.a<1)fg=comp(fg,bg);
 var op=cumOpacity(el,win);if(op<1)fg=comp({r:fg.r,g:fg.g,b:fg.b,a:op},bg);
 var size=parseFloat(cs.fontSize);var bold=parseInt(cs.fontWeight)>=700;
 var large=size>=24||(size>=18.66&&bold);var min=large?3.0:4.5;var cr=ratio(fg,bg);
 if(cr<min){var sel=el.tagName.toLowerCase()+(el.className&&typeof el.className==='string'?'.'+el.className.trim().split(/\s+/).slice(0,2).join('.'):'');return cr.toFixed(2)+'/'+min+tag+' ['+sel+'] fg='+Math.round(fg.r)+','+Math.round(fg.g)+','+Math.round(fg.b)+' bg='+Math.round(bg.r)+','+Math.round(bg.g)+','+Math.round(bg.b);}
 return null;}
window.onload=function(){setTimeout(function(){
 var fr=document.getElementById('f');var doc=fr.contentDocument;var win=fr.contentWindow;
 var all=doc.querySelectorAll('*');var fails=[];
 all.forEach(function(el){
  var t='';for(var i=0;i<el.childNodes.length;i++){if(el.childNodes[i].nodeType===3)t+=el.childNodes[i].textContent.trim();}
  if(!t)return;var cs=win.getComputedStyle(el);var fg=parse(cs.color);if(!fg)return;
  var r=el.getBoundingClientRect();if(r.width===0||r.height===0)return;
  var f=check(el,cs,fg,doc,win,'');if(f)fails.push('"'+t.slice(0,22)+'" '+f);
 });
 ['::before','::after','::placeholder'].forEach(function(pe){
  all.forEach(function(el){
   var cs=win.getComputedStyle(el,pe);if(!cs)return;
   if(pe!=='::placeholder'){var c=cs.content;if(!c||c==='none'||c==='normal'||c==='""'||c==="''")return;}
   else{if(el.tagName!=='INPUT'&&el.tagName!=='TEXTAREA')return;if(!el.placeholder)return;}
   var fg=parse(cs.color);if(!fg)return;var base=win.getComputedStyle(el);
   var f=check(el,{visibility:cs.visibility,display:cs.display,opacity:base.opacity,fontSize:cs.fontSize||base.fontSize,fontWeight:cs.fontWeight},fg,doc,win,pe);
   if(f)fails.push('PSEUDO'+pe+' '+f);
  });
 });
 document.getElementById('out').textContent='['+PAGE+'] FAILS('+fails.length+')::'+fails.join(' ||| ');
},2600);};
</script></body></html>
